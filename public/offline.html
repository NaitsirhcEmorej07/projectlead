<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Project LEAD</title>

    <style>
        body {
            margin: 0;
            font-family: system-ui, -apple-system, sans-serif;
            background: #f3f4f6;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            padding: 24px;
            width: 90%;
            max-width: 360px;
            text-align: center;
        }

        .icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 16px;
        }

        h1 {
            font-size: 20px;
            font-weight: 600;
            color: #1f2937;
            margin: 0;
        }

        p {
            font-size: 14px;
            color: #6b7280;
            margin: 10px 0 20px;
            line-height: 1.4;
        }

        .btn {
            width: 100%;
            background: #4f46e5;
            color: white;
            padding: 10px;
            border-radius: 10px;
            border: none;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .btn:active {
            transform: scale(0.96);
        }

        .btn:hover {
            background: #4338ca;
        }
    </style>
</head>

<body>

    <div class="card">

        <!-- Icon -->
        <img src="/images/lead_icon_192.png" class="icon">

        <!-- Title -->
        <h1>You're Offline 😢</h1>

        <!-- Message -->
        <p>
            No internet connection. Please check your network and try again.
        </p>

        <!-- Retry Button -->
        <button class="btn" onclick="window.location.reload()">
            Retry Connection
        </button>

    </div>

</body>

</html>
